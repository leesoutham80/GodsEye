[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/signals.json"
  [headers.values]
    Cache-Control = "public, max-age=60"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=30"
